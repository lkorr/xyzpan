name: Build macOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14          # Apple Silicon (arm64)

    steps:
      - uses: actions/checkout@v4

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/CPM
          key: cpm-macos-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}
          restore-keys: cpm-macos-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCPM_SOURCE_CACHE=~/.cache/CPM -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build
        run: cmake --build build --config Release

      - name: Verify universal binary
        run: |
          echo "AU architectures:"
          lipo -archs build/plugin/XYZPan_artefacts/Release/AU/XYZPan.component/Contents/MacOS/XYZPan
          echo "VST3 architectures:"
          lipo -archs build/plugin/XYZPan_artefacts/Release/VST3/XYZPan.vst3/Contents/MacOS/XYZPan
          echo "Standalone architectures:"
          lipo -archs build/plugin/XYZPan_artefacts/Release/Standalone/XYZPan.app/Contents/MacOS/XYZPan

      - name: Ad-hoc codesign
        run: |
          # Sign inner binaries first, then outer bundles (Apple best practice)
          codesign --force --sign - build/plugin/XYZPan_artefacts/Release/VST3/XYZPan.vst3/Contents/MacOS/XYZPan
          codesign --force --sign - build/plugin/XYZPan_artefacts/Release/VST3/XYZPan.vst3
          codesign --force --sign - build/plugin/XYZPan_artefacts/Release/AU/XYZPan.component/Contents/MacOS/XYZPan
          codesign --force --sign - build/plugin/XYZPan_artefacts/Release/AU/XYZPan.component
          codesign --force --sign - build/plugin/XYZPan_artefacts/Release/Standalone/XYZPan.app

      - name: Validate AU with auval
        run: |
          sudo cp -r build/plugin/XYZPan_artefacts/Release/AU/XYZPan.component /Library/Audio/Plug-Ins/Components/
          auval -v aufx Xzpn Paaq
          sudo rm -rf /Library/Audio/Plug-Ins/Components/XYZPan.component

      - name: Package artifacts
        run: |
          cd build/plugin/XYZPan_artefacts/Release
          zip -r XYZPan-macOS-VST3.zip VST3/XYZPan.vst3
          zip -r XYZPan-macOS-AU.zip AU/XYZPan.component
          zip -r XYZPan-macOS-Standalone.zip Standalone/XYZPan.app

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: XYZPan-macOS-VST3
          path: build/plugin/XYZPan_artefacts/Release/XYZPan-macOS-VST3.zip

      - name: Upload AU
        uses: actions/upload-artifact@v4
        with:
          name: XYZPan-macOS-AU
          path: build/plugin/XYZPan_artefacts/Release/XYZPan-macOS-AU.zip

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: XYZPan-macOS-Standalone
          path: build/plugin/XYZPan_artefacts/Release/XYZPan-macOS-Standalone.zip
