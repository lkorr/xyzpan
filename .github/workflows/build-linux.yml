name: Build Linux

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev libxcomposite-dev \
            libxcursor-dev libxinerama-dev libgl1-mesa-dev \
            libasound2-dev libfreetype-dev libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev pkg-config

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/CPM
          key: cpm-linux-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}
          restore-keys: cpm-linux-

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCPM_SOURCE_CACHE=~/.cache/CPM

      - name: Build
        run: cmake --build build --config Release

      - name: Package artifacts
        run: |
          cd build/plugin/XYZPan_artefacts/Release
          zip -r XYZPan-Linux-VST3.zip VST3/XYZPan.vst3
          zip -r XYZPan-Linux-Standalone.zip Standalone/XYZPan

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: XYZPan-Linux-VST3
          path: build/plugin/XYZPan_artefacts/Release/XYZPan-Linux-VST3.zip

      - name: Upload Standalone
        uses: actions/upload-artifact@v4
        with:
          name: XYZPan-Linux-Standalone
          path: build/plugin/XYZPan_artefacts/Release/XYZPan-Linux-Standalone.zip
